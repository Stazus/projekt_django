<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Rejestracja</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            margin: 30px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
        }

        label {
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 20px;
        }

        .helptext {
            color: #666;
            font-size: 0.9em;
        }

        .errorlist {
            color: red;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">

    <p>
        <a href="{% url 'home' %}">← Wróć do strony głównej</a>
    </p>

    <h1>Rejestracja użytkownika</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">
            Zarejestruj się
        </button>
    </form>

</div>

</body>
</html>

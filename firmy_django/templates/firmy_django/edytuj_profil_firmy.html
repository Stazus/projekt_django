<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Edytuj profil firmy</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f7f7f7;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
        }

        input,
        textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 18px;
        }

        a {
            text-decoration: none;
            color: #1565c0;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <p>
        <a href="{% url 'szczegoly_firmy' firma.id %}">
            ← Wróć do szczegółów firmy
        </a>
    </p>

    <h1>Profil firmy: {{ firma.nazwa }}</h1>

    <form method="post" enctype="multipart/form-data">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Zapisz profil
        </button>

    </form>

</div>

</body>
</html>

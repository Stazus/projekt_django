services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      - USE_DOCKER=True
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: projekt_django
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

  celery:
    build: .
    command: celery -A projekt_django worker -l info
    environment:
      - USE_DOCKER=True
    volumes:
      - .:/app
    depends_on:
      - redis
      - db

volumes:
  postgres_data:
